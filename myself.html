<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>自己紹介 — Kaung Set Lin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --dark: #0e0e0e;
      --dark2: #161616;
      --dark3: #1e1e1e;
      --text: #e8e0d0;
      --muted: #8a8070;
      --accent: #c9a84c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grid texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 60px 30px 100px;
    }

    /* ── HEADER ── */
    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 40px;
      margin-bottom: 80px;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(201,168,76,0.2);
      animation: fadeUp 0.8s ease both;
    }

    .header-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 8vw, 88px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header h1 span {
      color: var(--gold);
    }

    .header-right {
      text-align: right;
    }

    .profile-img-wrap {
      position: relative;
      display: inline-block;
    }

    .profile-img-wrap::before {
      content: '';
      position: absolute;
      inset: -6px;
      border: 1px solid var(--gold);
      opacity: 0.4;
      transform: rotate(3deg);
    }

    .profile-img-wrap::after {
      content: '';
      position: absolute;
      inset: -12px;
      border: 1px solid var(--gold);
      opacity: 0.15;
      transform: rotate(-2deg);
    }

    .profile-img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      display: block;
      filter: grayscale(20%) contrast(1.05);
    }

    /* Fallback avatar */
    .avatar-fallback {
      width: 140px;
      height: 140px;
      background: var(--dark3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 56px;
      color: var(--gold);
      letter-spacing: -2px;
    }

    /* ── SECTION ── */
    .section {
      margin-bottom: 60px;
      animation: fadeUp 0.8s ease both;
    }

    .section:nth-child(2) { animation-delay: 0.1s; }
    .section:nth-child(3) { animation-delay: 0.2s; }
    .section:nth-child(4) { animation-delay: 0.3s; }
    .section:nth-child(5) { animation-delay: 0.4s; }
    .section:nth-child(6) { animation-delay: 0.5s; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .section-num {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--gold);
      opacity: 0.7;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(201,168,76,0.3), transparent);
    }

    /* ── INFO GRID ── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.15);
    }

    .info-cell {
      background: var(--dark2);
      padding: 22px 24px;
      transition: background 0.2s;
    }

    .info-cell:hover {
      background: var(--dark3);
    }

    .info-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .info-value {
      font-size: 15px;
      color: var(--text);
      font-weight: 400;
    }

    .info-value a {
      color: var(--gold-light);
      text-decoration: none;
      border-bottom: 1px solid rgba(201,168,76,0.3);
      transition: border-color 0.2s, color 0.2s;
    }

    .info-value a:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    /* ── BADGE ROW ── */
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border: 1px solid rgba(201,168,76,0.2);
      background: var(--dark2);
      font-size: 14px;
      transition: border-color 0.2s, background 0.2s;
      cursor: default;
    }

    .badge:hover {
      border-color: var(--gold);
      background: var(--dark3);
    }

    .badge-icon {
      font-size: 18px;
    }

    /* ── SKILL TABLE ── */
    .skill-table {
      width: 100%;
      border-collapse: collapse;
    }

    .skill-table th,
    .skill-table td {
      padding: 14px 20px;
      text-align: left;
      border-bottom: 1px solid rgba(201,168,76,0.08);
    }

    .skill-table th {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--gold);
      opacity: 0.7;
      text-transform: uppercase;
      background: rgba(201,168,76,0.04);
    }

    .skill-table td {
      font-size: 14px;
      color: var(--text);
    }

    .skill-table tr:hover td {
      background: rgba(201,168,76,0.03);
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      margin-right: 6px;
    }

    /* ── DREAM BLOCK ── */
    .dream-block {
      position: relative;
      padding: 36px 40px;
      border-left: 2px solid var(--gold);
      background: var(--dark2);
      overflow: hidden;
    }

    .dream-block::before {
      content: '夢';
      position: absolute;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 120px;
      color: rgba(201,168,76,0.05);
      line-height: 1;
    }

    .dream-block p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1.5;
    }

    /* ── NOTE BLOCK ── */
    .note-block {
      padding: 28px 32px;
      border: 1px solid rgba(201,168,76,0.15);
      background: var(--dark2);
      font-size: 15px;
      line-height: 1.8;
      color: var(--muted);
      font-style: italic;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 80px;
      padding-top: 30px;
      border-top: 1px solid rgba(201,168,76,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeUp 0.8s 0.6s ease both;
    }

    .footer-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      color: var(--gold);
      opacity: 0.6;
    }

    .footer-link a {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--gold);
      opacity: 0.5;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .footer-link a:hover {
      opacity: 1;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .header { grid-template-columns: 1fr; }
      .header-right { display: none; }
      .footer { flex-direction: column; gap: 12px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <div>
        <div class="header-label">自己紹介 / Profile</div>
        <h1>Kaung<br><span>Set Lin</span></h1>
      </div>
      <div class="header-right">
        <div class="profile-img-wrap">
          <img class="profile-img" src="ProfilePic.jpg" alt="Kaung Set Lin"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="avatar-fallback" style="display:none;">KL</div>
        </div>
      </div>
    </header>

    <!-- BASIC INFO -->
    <section class="section">
      <div class="section-header">
        <span class="section-num">01</span>
        <h2 class="section-title">基本情報</h2>
        <div class="section-line"></div>
      </div>
      <div class="info-grid">
        <div class="info-cell">
          <div class="info-label">出身地</div>
          <div class="info-value"><a href="mymap.html">🇲🇲 ミャンマー</a></div>
        </div>
        <div class="info-cell">
          <div class="info-label">第一言語</div>
          <div class="info-value">ミャンマー語</div>
        </div>
        <div class="info-cell">
          <div class="info-label">来日年月日</div>
          <div class="info-value">2002年 01月</div>
        </div>
        <div class="info-cell">
          <div class="info-label">日本語能力</div>
          <div class="info-value">JLPT N2</div>
        </div>
      </div>
    </section>

    <!-- PC SKILLS -->
    <section class="section">
      <div class="section-header">
        <span class="section-num">02</span>
        <h2 class="section-title">パソコン・スキル</h2>
        <div class="section-line"></div>
      </div>
      <table class="skill-table">
        <thead>
          <tr>
            <th>項目</th>
            <th>詳細</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>所有</td>
            <td><span class="dot"></span>所持あり</td>
          </tr>
          <tr>
            <td>OS</td>
            <td><span class="dot"></span>macOS</td>
          </tr>
          <tr>
            <td>用途</td>
            <td><span class="dot"></span>Coding</td>
          </tr>
        </tbody>
      </table>

      <br>

      <div class="badge-row">
        <div class="badge"><span class="badge-icon">📊</span> Excel &nbsp;<span style="color:var(--gold)">✓</span></div>
        <div class="badge"><span class="badge-icon">📝</span> Word &nbsp;<span style="color:var(--gold)">✓</span></div>
        <div class="badge"><span class="badge-icon">📐</span> PowerPoint &nbsp;<span style="color:var(--gold)">✓</span></div>
      </div>
    </section>

    <!-- LIKES & DISLIKES -->
    <section class="section">
      <div class="section-header">
        <span class="section-num">03</span>
        <h2 class="section-title">好き・嫌い</h2>
        <div class="section-line"></div>
      </div>
      <div class="info-grid">
        <div class="info-cell">
          <div class="info-label">好きなこと</div>
          <div class="info-value"><a href="mylikes.html">🎮 ゲーム</a></div>
        </div>
        <div class="info-cell">
          <div class="info-label">嫌いなこと</div>
          <div class="info-value">📖 漢字</div>
        </div>
      </div>
    </section>

    <!-- DREAM -->
    <section class="section">
      <div class="section-header">
        <span class="section-num">04</span>
        <h2 class="section-title">わたしのゆめ</h2>
        <div class="section-line"></div>
      </div>
      <div class="dream-block">
        <p>目標：進学</p>
      </div>
    </section>

    <!-- NOTE -->
    <section class="section">
      <div class="section-header">
        <span class="section-num">05</span>
        <h2 class="section-title">ひとこと</h2>
        <div class="section-line"></div>
      </div>
      <div class="note-block">
        なんでも自由に書いてください
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-name">Kaung Set Lin</div>
      <div class="footer-link">
        <a href="https://kaungsetlin3013.github.io/SchoolProfileProject/">← Back to Top</a>
      </div>
    </footer>

  </div>
</body>
</html>
